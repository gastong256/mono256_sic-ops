---
name: Supabase Keepalive

"on":
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes ca-certificates curl gnupg

          sudo install -d -m 0755 /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
            sudo gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
          echo "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] \
            http://apt.postgresql.org/pub/repos/apt noble-pgdg main" | \
            sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null

          sudo apt-get update
          sudo apt-get install --yes postgresql-client-17
          psql --version

      - name: Run Supabase keepalive query
        id: keepalive_query
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_DB_HOST:-}" ] || [ -z "${SUPABASE_DB_USER:-}" ] || \
             [ -z "${PGPASSWORD:-}" ]; then
            echo "::error::Supabase connection secrets are required."
            exit 1
          fi

          status="down"
          for attempt in 1 2; do
            echo "Running Supabase keepalive query (attempt ${attempt}/2)..."
            if timeout 15s psql \
              "host=${SUPABASE_DB_HOST} port=5432 dbname=postgres user=${SUPABASE_DB_USER} \
              sslmode=require connect_timeout=15" \
              -c "SELECT 1 AS keepalive, NOW() AS checked_at;"; then
              status="up"
              break
            fi

            if [ "$attempt" -lt 2 ]; then
              sleep 10
            fi
          done

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Notify Discord on failure
        if: >-
          ${{
            always() &&
            steps.keepalive_query.outputs.status == 'down' &&
            env.DISCORD_WEBHOOK_URL != ''
          }}
        env:
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          message_file="$(mktemp)"
          payload_file="$(mktemp)"
          response_file="$(mktemp)"

          python3 > "$message_file" <<'PY'
          import os

          repo = os.getenv("REPO", "")
          run_id = os.getenv("RUN_ID", "")
          lines = [
              "Supabase keepalive failed after 2 attempts.",
              "Verify whether the free-tier project was paused in the dashboard.",
              "Restore path: Supabase Dashboard -> your project -> Restore button.",
          ]
          if repo and run_id:
              lines.append(f"Run: https://github.com/{repo}/actions/runs/{run_id}")

          print("\n".join(lines))
          PY

          python3 - "$message_file" > "$payload_file" <<'PY'
          import json
          import pathlib
          import sys

          print(json.dumps({"content": pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")}))
          PY

          http_code="$(
            curl -sS --max-time 15 \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary "@${payload_file}" \
              "$DISCORD_WEBHOOK_URL"
          )" || http_code="000"

          if [ "$http_code" = "200" ] || [ "$http_code" = "204" ]; then
            echo "Discord Supabase keepalive alert sent successfully."
          else
            echo "Discord notification failed with HTTP ${http_code}."
            echo "Discord fallback message:"
            cat "$message_file"
          fi

          rm -f "$message_file" "$payload_file" "$response_file"

      - name: Fail if Supabase remains unavailable
        if: ${{ always() && steps.keepalive_query.outputs.status == 'down' }}
        shell: bash
        run: |
          echo "::error::Supabase did not respond to the keepalive query."
          exit 1

---
name: Supabase Keepalive

"on":
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Run Supabase keepalive query
        id: keepalive_query
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_DB_HOST:-}" ] || [ -z "${SUPABASE_DB_USER:-}" ] || \
             [ -z "${PGPASSWORD:-}" ]; then
            echo "::error::Supabase connection secrets are required."
            exit 1
          fi

          status="down"
          for attempt in 1 2; do
            echo "Running Supabase keepalive query (attempt ${attempt}/2)..."
            if timeout 15s psql \
              "host=${SUPABASE_DB_HOST} port=5432 dbname=postgres user=${SUPABASE_DB_USER} \
              sslmode=require connect_timeout=15" \
              -c "SELECT 1 AS keepalive, NOW() AS checked_at;"; then
              status="up"
              break
            fi

            if [ "$attempt" -lt 2 ]; then
              sleep 10
            fi
          done

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Notify Discord on failure
        if: >-
          ${{
            always() &&
            steps.keepalive_query.outputs.status == 'down' &&
            secrets.DISCORD_WEBHOOK_URL != ''
          }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          export MESSAGE="$(
            python3 <<'PY'
            import os

            repo = os.getenv("REPO", "")
            run_id = os.getenv("RUN_ID", "")
            lines = [
                "Supabase keepalive failed after 2 attempts.",
                "Verify whether the free-tier project was paused in the dashboard.",
                "Restore path: Supabase Dashboard -> your project -> Restore button.",
            ]
            if repo and run_id:
                lines.append(f"Run: https://github.com/{repo}/actions/runs/{run_id}")
            print("\n".join(lines))
            PY
          )"

          python3 <<'PY' || true
          import json
          import os
          import urllib.request

          payload = json.dumps({"content": os.environ["MESSAGE"]}).encode("utf-8")
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          try:
              urllib.request.urlopen(request, timeout=15).read()
          except Exception as exc:
              print(f"Discord notification failed: {exc}")
          PY

      - name: Fail if Supabase remains unavailable
        if: ${{ always() && steps.keepalive_query.outputs.status == 'down' }}
        shell: bash
        run: |
          echo "::error::Supabase did not respond to the keepalive query."
          exit 1

---
name: Keep Alive

"on":
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: API health check
        id: api_check
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${API_HEALTH_URL:-}" ]; then
            echo "::error::API_HEALTH_URL is required."
            exit 1
          fi

          body_file="$(mktemp)"
          status="down"
          redis="unknown"
          last_code="000"

          parse_redis() {
          python3 - "$1" <<'PY'
          import json
          import sys

          try:
              with open(sys.argv[1], "r", encoding="utf-8") as handle:
                  payload = json.load(handle)
          except Exception:
              print("unknown")
              raise SystemExit(0)

          value = payload.get("redis", "missing")
          if value is True:
              print("up")
          elif value is False:
              print("down")
          else:
              print("unknown")
          PY
          }

          for attempt in 1 2 3; do
            echo "Checking API health (attempt ${attempt}/3)..."
            if code="$(curl -sS --max-time 15 -o "$body_file" -w "%{http_code}" "$API_HEALTH_URL")"; then
              last_code="$code"
              if [ "$code" = "200" ]; then
                status="up"
                redis="$(parse_redis "$body_file")"
                echo "API is up. Redis status: ${redis}."
                break
              fi
              echo "API returned HTTP ${code}."
            else
              last_code="000"
              echo "API request failed or timed out."
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 10
            fi
          done

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "redis=$redis" >> "$GITHUB_OUTPUT"
          echo "last_code=$last_code" >> "$GITHUB_OUTPUT"

      - name: Frontend health check
        id: frontend_check
        if: ${{ secrets.FRONTEND_URL != '' }}
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking frontend availability..."
          if code="$(curl -sS --max-time 15 -o /tmp/frontend_response.txt -w "%{http_code}" "$FRONTEND_URL")"; then
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "status=up" >> "$GITHUB_OUTPUT"
              echo "Frontend is reachable with HTTP ${code}."
            else
              echo "status=down" >> "$GITHUB_OUTPUT"
              echo "Frontend returned HTTP ${code}."
            fi
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
            echo "Frontend request failed or timed out."
          fi

      - name: Auto-redeploy on Render
        id: redeploy
        if: ${{ steps.api_check.outputs.status == 'down' }}
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::RENDER_DEPLOY_HOOK_URL is required when the API is down."
            exit 1
          fi

          echo "Triggering Render redeploy hook via POST..."
          method="POST"
          code="$(curl -sS --max-time 15 -o /tmp/render_redeploy.txt -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")" || code="000"

          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "POST returned HTTP ${code}. Retrying with GET..."
            method="GET"
            code="$(curl -sS --max-time 15 -o /tmp/render_redeploy.txt -w "%{http_code}" \
              "$RENDER_DEPLOY_HOOK_URL")" || code="000"
          fi

          echo "method=$method" >> "$GITHUB_OUTPUT"
          echo "last_code=$code" >> "$GITHUB_OUTPUT"

          if [ "$code" = "200" ] || [ "$code" = "201" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "Render redeploy hook accepted with HTTP ${code}."
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Render redeploy hook failed with HTTP ${code}."
            exit 1
          fi

      - name: Smoke test after redeploy
        id: smoke
        if: ${{ steps.redeploy.outputs.status == 'success' }}
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        shell: bash
        run: |
          set -euo pipefail

          body_file="$(mktemp)"
          status="down"
          redis="unknown"
          last_code="000"
          recovery="failed"

          parse_redis() {
          python3 - "$1" <<'PY'
          import json
          import sys

          try:
              with open(sys.argv[1], "r", encoding="utf-8") as handle:
                  payload = json.load(handle)
          except Exception:
              print("unknown")
              raise SystemExit(0)

          value = payload.get("redis", "missing")
          if value is True:
              print("up")
          elif value is False:
              print("down")
          else:
              print("unknown")
          PY
          }

          echo "Waiting 90 seconds for Render cold start..."
          sleep 90

          for attempt in 1 2 3 4 5; do
            echo "Running smoke test (attempt ${attempt}/5)..."
            if code="$(curl -sS --max-time 15 -o "$body_file" -w "%{http_code}" "$API_HEALTH_URL")"; then
              last_code="$code"
              if [ "$code" = "200" ]; then
                status="up"
                redis="$(parse_redis "$body_file")"
                recovery="success"
                echo "Recovery check passed. Redis status: ${redis}."
                break
              fi
              echo "Smoke test returned HTTP ${code}."
            else
              last_code="000"
              echo "Smoke test request failed or timed out."
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep 30
            fi
          done

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "redis=$redis" >> "$GITHUB_OUTPUT"
          echo "last_code=$last_code" >> "$GITHUB_OUTPUT"
          echo "recovery=$recovery" >> "$GITHUB_OUTPUT"

          if [ "$recovery" != "success" ]; then
            echo "::error::Smoke test did not recover the API after redeploy."
            exit 1
          fi

      - name: Mark API unavailable
        id: mark_api_unavailable
        if: >-
          ${{
            steps.api_check.outputs.status == 'down' &&
            steps.smoke.outputs.recovery != 'success'
          }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::error::API stayed unavailable after the recovery flow."
          exit 1

      - name: Mark Redis degraded
        id: mark_redis_degraded
        if: >-
          ${{
            (steps.api_check.outputs.status == 'up' && steps.api_check.outputs.redis != 'up') ||
            (steps.smoke.outputs.recovery == 'success' && steps.smoke.outputs.redis != 'up')
          }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::warning::Redis did not report a healthy state."
          exit 1

      - name: Mark frontend degraded
        id: mark_frontend_degraded
        if: ${{ secrets.FRONTEND_URL != '' && steps.frontend_check.outputs.status == 'down' }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::warning::Frontend health check failed."
          exit 1

      - name: Mark recovery failed
        id: mark_recovery_failed
        if: >-
          ${{
            steps.api_check.outputs.status == 'down' &&
            (
              steps.redeploy.outputs.status == 'failed' ||
              steps.smoke.outputs.recovery == 'failed'
            )
          }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::error::Redeploy was triggered but recovery did not complete cleanly."
          exit 1

      - name: Notify Discord
        if: >-
          ${{
            always() &&
            secrets.DISCORD_WEBHOOK_URL != '' &&
            (
              steps.api_check.outputs.status == 'down' ||
              steps.api_check.outputs.redis != 'up' ||
              steps.smoke.outputs.redis == 'down' ||
              steps.frontend_check.outputs.status == 'down'
            )
          }}
        env:
          API_STATUS: ${{ steps.api_check.outputs.status }}
          API_CODE: ${{ steps.api_check.outputs.last_code }}
          REDIS_STATUS: ${{ steps.api_check.outputs.redis }}
          FRONTEND_STATUS: ${{ steps.frontend_check.outputs.status }}
          REDEPLOY_STATUS: ${{ steps.redeploy.outputs.status }}
          REDEPLOY_CODE: ${{ steps.redeploy.outputs.last_code }}
          SMOKE_RECOVERY: ${{ steps.smoke.outputs.recovery }}
          SMOKE_REDIS: ${{ steps.smoke.outputs.redis }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail

          export MESSAGE="$(
            python3 <<'PY'
            import os

            lines = ["Ops alert from keep-alive workflow:"]

            api_status = os.getenv("API_STATUS", "")
            api_code = os.getenv("API_CODE", "unknown")
            redis_status = os.getenv("REDIS_STATUS", "")
            frontend_status = os.getenv("FRONTEND_STATUS", "")
            redeploy_status = os.getenv("REDEPLOY_STATUS", "")
            redeploy_code = os.getenv("REDEPLOY_CODE", "")
            smoke_recovery = os.getenv("SMOKE_RECOVERY", "")
            smoke_redis = os.getenv("SMOKE_REDIS", "")

            if api_status == "down":
                lines.append(f"- API health check failed (last HTTP code: {api_code}).")
            if redis_status == "down":
                lines.append("- Redis reported unhealthy on the primary API check.")
            elif redis_status == "unknown" and api_status == "up":
                lines.append("- Redis status could not be confirmed from the health payload.")

            if frontend_status == "down":
                lines.append("- Frontend health check failed.")

            if redeploy_status == "success":
                lines.append(
                    f"- Render redeploy hook accepted (HTTP {redeploy_code or 'unknown'})."
                )
            elif redeploy_status == "failed":
                lines.append(
                    f"- Render redeploy hook failed (HTTP {redeploy_code or 'unknown'})."
                )

            if smoke_recovery == "success":
                lines.append("- Post-redeploy smoke test recovered successfully.")
                if smoke_redis == "down":
                    lines.append("- Redis was still unhealthy after recovery.")
                elif smoke_redis == "unknown":
                    lines.append("- Redis status stayed unknown after recovery.")
            elif smoke_recovery == "failed":
                lines.append("- Post-redeploy smoke test failed.")

            repo = os.getenv("REPO", "")
            run_id = os.getenv("RUN_ID", "")
            if repo and run_id:
                lines.append(f"- Run: https://github.com/{repo}/actions/runs/{run_id}")

            print("\n".join(lines))
            PY
          )"

          python3 <<'PY' || true
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK_URL"]
          payload = json.dumps({"content": os.environ["MESSAGE"]}).encode("utf-8")
          request = urllib.request.Request(
              webhook,
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          try:
              urllib.request.urlopen(request, timeout=15).read()
          except Exception as exc:
              print(f"Discord notification failed: {exc}")
          PY

      - name: Evaluate final status
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.mark_api_unavailable.outcome }}" = "failure" ] || \
             [ "${{ steps.mark_redis_degraded.outcome }}" = "failure" ] || \
             [ "${{ steps.mark_frontend_degraded.outcome }}" = "failure" ] || \
             [ "${{ steps.mark_recovery_failed.outcome }}" = "failure" ]; then
            echo "::error::One or more monitored components need attention."
            exit 1
          fi

          echo "All monitored components are healthy."

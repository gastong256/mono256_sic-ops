---
name: Keep Alive

"on":
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
      API_READY_URL: ${{ secrets.API_READY_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Readiness check
        id: readiness_check
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${API_READY_URL:-}" ]; then
            echo "::error::API_READY_URL is required."
            exit 1
          fi

          body_file="$(mktemp)"
          parser_file="$(mktemp)"
          status="no_response"
          redis="unknown"
          db="unknown"
          last_code="000"

          cat > "$parser_file" <<'PY'
          import json
          import sys

          result = {"redis": "unknown", "db": "unknown"}

          try:
              with open(sys.argv[1], "r", encoding="utf-8") as handle:
                  payload = json.load(handle)
          except Exception:
              payload = {}

          for key in ("redis", "db"):
              value = payload.get(key, "missing")
              if value is True:
                  result[key] = "up"
              elif value is False:
                  result[key] = "down"

          for key, value in result.items():
              print(f"{key}={value}")
          PY

          parse_dependencies() {
            python3 "$parser_file" "$1"
          }

          for attempt in 1 2 3; do
            echo "Checking API readiness at /readyz (attempt ${attempt}/3)..."
            if code="$(curl -sS --max-time 15 -o "$body_file" -w "%{http_code}" "$API_READY_URL")"; then
              last_code="$code"
              eval "$(parse_dependencies "$body_file")"

              if [ "$code" = "200" ]; then
                status="ready"
                echo "API is ready. Redis: ${redis}. DB: ${db}."
                break
              fi

              if [ "$code" = "503" ]; then
                status="dependency_failure"
                echo "::warning::API is alive but not ready. Redis: ${redis}. DB: ${db}."
                break
              fi

              status="unexpected_status"
              echo "::warning::Readiness endpoint returned unexpected HTTP ${code}. Redis: ${redis}. DB: ${db}."
              break
            fi

            last_code="000"
            echo "Readiness request failed or timed out."
            if [ "$attempt" -lt 3 ]; then
              sleep 10
            fi
          done

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "redis=$redis" >> "$GITHUB_OUTPUT"
          echo "db=$db" >> "$GITHUB_OUTPUT"
          echo "last_code=$last_code" >> "$GITHUB_OUTPUT"

          rm -f "$body_file" "$parser_file"

      - name: Liveness check
        id: liveness_check
        if: ${{ steps.readiness_check.outputs.status == 'no_response' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${API_HEALTH_URL:-}" ]; then
            echo "::error::API_HEALTH_URL is required."
            exit 1
          fi

          status="down"
          last_code="000"

          for attempt in 1 2; do
            echo "Checking API liveness at /healthz (attempt ${attempt}/2)..."
            if code="$(curl -sS --max-time 15 -o /tmp/healthz_response.txt -w "%{http_code}" "$API_HEALTH_URL")"; then
              last_code="$code"
              if [ "$code" = "200" ]; then
                status="up"
                echo "Django process is alive."
                break
              fi
              echo "Liveness endpoint returned HTTP ${code}."
            else
              last_code="000"
              echo "Liveness request failed or timed out."
            fi

            if [ "$attempt" -lt 2 ]; then
              sleep 10
            fi
          done

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "last_code=$last_code" >> "$GITHUB_OUTPUT"

      - name: Frontend health check
        id: frontend_check
        if: ${{ env.FRONTEND_URL != '' }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking frontend availability..."
          if code="$(curl -sS --max-time 15 -o /tmp/frontend_response.txt -w "%{http_code}" "$FRONTEND_URL")"; then
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              echo "status=up" >> "$GITHUB_OUTPUT"
              echo "Frontend is reachable with HTTP ${code}."
            else
              echo "status=down" >> "$GITHUB_OUTPUT"
              echo "Frontend returned HTTP ${code}."
            fi
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
            echo "Frontend request failed or timed out."
          fi

      - name: Auto-redeploy on Render
        id: redeploy
        if: >-
          ${{
            steps.readiness_check.outputs.status == 'no_response' &&
            steps.liveness_check.outputs.status == 'down'
          }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::RENDER_DEPLOY_HOOK_URL is required when the Django process is down."
            exit 1
          fi

          echo "Django process is down. Triggering Render redeploy hook..."
          method="POST"
          code="$(curl -sS --max-time 15 -o /tmp/render_redeploy.txt -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")" || code="000"

          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "POST returned HTTP ${code}. Retrying with GET..."
            method="GET"
            code="$(curl -sS --max-time 15 -o /tmp/render_redeploy.txt -w "%{http_code}" \
              "$RENDER_DEPLOY_HOOK_URL")" || code="000"
          fi

          echo "method=$method" >> "$GITHUB_OUTPUT"
          echo "last_code=$code" >> "$GITHUB_OUTPUT"

          if [ "$code" = "200" ] || [ "$code" = "201" ]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "Render redeploy hook accepted with HTTP ${code}."
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "::error::Render redeploy hook failed with HTTP ${code}."
            exit 1
          fi

      - name: Smoke test after redeploy
        id: smoke
        if: ${{ steps.redeploy.outputs.status == 'success' }}
        shell: bash
        run: |
          set -euo pipefail

          health_status="down"
          health_code="000"
          ready_status="not_checked"
          ready_code="000"
          redis="unknown"
          db="unknown"
          recovery="failed"
          ready_body="$(mktemp)"
          parser_file="$(mktemp)"

          cat > "$parser_file" <<'PY'
          import json
          import sys

          result = {"redis": "unknown", "db": "unknown"}

          try:
              with open(sys.argv[1], "r", encoding="utf-8") as handle:
                  payload = json.load(handle)
          except Exception:
              payload = {}

          for key in ("redis", "db"):
              value = payload.get(key, "missing")
              if value is True:
                  result[key] = "up"
              elif value is False:
                  result[key] = "down"

          for key, value in result.items():
              print(f"{key}={value}")
          PY

          parse_dependencies() {
            python3 "$parser_file" "$1"
          }

          echo "Waiting 90 seconds for Render cold start..."
          sleep 90

          for attempt in 1 2 3; do
            echo "Checking /healthz after redeploy (attempt ${attempt}/3)..."
            if code="$(curl -sS --max-time 15 -o /tmp/smoke_healthz.txt -w "%{http_code}" "$API_HEALTH_URL")"; then
              health_code="$code"
              if [ "$code" = "200" ]; then
                health_status="up"
                echo "Django process started successfully."
                break
              fi
              echo "Smoke liveness check returned HTTP ${code}."
            else
              health_code="000"
              echo "Smoke liveness request failed or timed out."
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 30
            fi
          done

          if [ "$health_status" = "up" ]; then
            for attempt in 1 2 3; do
              echo "Checking /readyz after redeploy (attempt ${attempt}/3)..."
              if code="$(curl -sS --max-time 15 -o "$ready_body" -w "%{http_code}" "$API_READY_URL")"; then
                ready_code="$code"
                eval "$(parse_dependencies "$ready_body")"

                if [ "$code" = "200" ]; then
                  ready_status="ready"
                  recovery="complete"
                  echo "Recovery complete. Redis: ${redis}. DB: ${db}."
                  break
                fi

                if [ "$code" = "503" ]; then
                  ready_status="dependency_failure"
                  recovery="partial"
                  echo "::warning::Process recovered, but readiness still fails."
                  echo "::warning::Redis: ${redis}. DB: ${db}."
                  break
                fi

                ready_status="unexpected_status"
                recovery="partial"
                echo "::warning::Readyz returned unexpected HTTP ${code} after redeploy. Redis: ${redis}. DB: ${db}."
                break
              fi

              ready_code="000"
              echo "Smoke readiness request failed or timed out."
              if [ "$attempt" -lt 3 ]; then
                sleep 30
              fi
            done
          fi

          echo "health_status=$health_status" >> "$GITHUB_OUTPUT"
          echo "health_code=$health_code" >> "$GITHUB_OUTPUT"
          echo "ready_status=$ready_status" >> "$GITHUB_OUTPUT"
          echo "ready_code=$ready_code" >> "$GITHUB_OUTPUT"
          echo "redis=$redis" >> "$GITHUB_OUTPUT"
          echo "db=$db" >> "$GITHUB_OUTPUT"
          echo "recovery=$recovery" >> "$GITHUB_OUTPUT"

          rm -f "$ready_body" "$parser_file"

      - name: Mark readiness degraded
        id: mark_readiness_degraded
        if: >-
          ${{
            steps.readiness_check.outputs.status == 'dependency_failure' ||
            steps.readiness_check.outputs.status == 'unexpected_status' ||
            (
              steps.readiness_check.outputs.status == 'no_response' &&
              steps.liveness_check.outputs.status == 'up'
            )
          }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::warning::API process is alive but not ready to serve requests."
          exit 1

      - name: Mark frontend degraded
        id: mark_frontend_degraded
        if: ${{ env.FRONTEND_URL != '' && steps.frontend_check.outputs.status == 'down' }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::warning::Frontend health check failed."
          exit 1

      - name: Mark recovery degraded
        id: mark_recovery_degraded
        if: ${{ steps.smoke.outputs.recovery == 'partial' }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::warning::Django process recovered but dependencies are still failing."
          exit 1

      - name: Mark process unavailable
        id: mark_process_unavailable
        if: >-
          ${{
            steps.readiness_check.outputs.status == 'no_response' &&
            steps.liveness_check.outputs.status == 'down' &&
            (
              steps.redeploy.outputs.status == 'failed' ||
              steps.smoke.outputs.recovery == 'failed'
            )
          }}
        continue-on-error: true
        shell: bash
        run: |
          echo "::error::Django process stayed unavailable after the recovery flow."
          exit 1

      - name: Notify Discord
        if: >-
          ${{
            always() &&
            env.DISCORD_WEBHOOK_URL != '' &&
            (
              steps.mark_readiness_degraded.outcome == 'failure' ||
              steps.mark_frontend_degraded.outcome == 'failure' ||
              steps.mark_recovery_degraded.outcome == 'failure' ||
              steps.mark_process_unavailable.outcome == 'failure' ||
              steps.redeploy.outputs.status == 'success'
            )
          }}
        env:
          FRONTEND_STATUS: ${{ steps.frontend_check.outputs.status }}
          LIVENESS_CODE: ${{ steps.liveness_check.outputs.last_code }}
          LIVENESS_STATUS: ${{ steps.liveness_check.outputs.status }}
          READINESS_CODE: ${{ steps.readiness_check.outputs.last_code }}
          READINESS_DB: ${{ steps.readiness_check.outputs.db }}
          READINESS_REDIS: ${{ steps.readiness_check.outputs.redis }}
          READINESS_STATUS: ${{ steps.readiness_check.outputs.status }}
          REDEPLOY_CODE: ${{ steps.redeploy.outputs.last_code }}
          REDEPLOY_STATUS: ${{ steps.redeploy.outputs.status }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SMOKE_DB: ${{ steps.smoke.outputs.db }}
          SMOKE_HEALTH_CODE: ${{ steps.smoke.outputs.health_code }}
          SMOKE_HEALTH_STATUS: ${{ steps.smoke.outputs.health_status }}
          SMOKE_READY_CODE: ${{ steps.smoke.outputs.ready_code }}
          SMOKE_READY_STATUS: ${{ steps.smoke.outputs.ready_status }}
          SMOKE_RECOVERY: ${{ steps.smoke.outputs.recovery }}
          SMOKE_REDIS: ${{ steps.smoke.outputs.redis }}
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY' || true
          import json
          import os
          import urllib.request

          def symbol(value: str) -> str:
              if value == "up":
                  return "✓"
              if value == "down":
                  return "❌"
              return "?"

          def deps_summary(redis_value: str, db_value: str) -> str:
              return f"Redis: {symbol(redis_value)}, DB: {symbol(db_value)}"

          lines = ["Ops alert from keep-alive workflow:"]
          readiness_status = os.getenv("READINESS_STATUS", "")
          readiness_code = os.getenv("READINESS_CODE", "unknown")
          readiness_redis = os.getenv("READINESS_REDIS", "unknown")
          readiness_db = os.getenv("READINESS_DB", "unknown")
          liveness_status = os.getenv("LIVENESS_STATUS", "")
          liveness_code = os.getenv("LIVENESS_CODE", "unknown")
          redeploy_status = os.getenv("REDEPLOY_STATUS", "")
          redeploy_code = os.getenv("REDEPLOY_CODE", "unknown")
          smoke_recovery = os.getenv("SMOKE_RECOVERY", "")
          smoke_health_status = os.getenv("SMOKE_HEALTH_STATUS", "")
          smoke_health_code = os.getenv("SMOKE_HEALTH_CODE", "unknown")
          smoke_ready_status = os.getenv("SMOKE_READY_STATUS", "")
          smoke_ready_code = os.getenv("SMOKE_READY_CODE", "unknown")
          smoke_redis = os.getenv("SMOKE_REDIS", "unknown")
          smoke_db = os.getenv("SMOKE_DB", "unknown")
          frontend_status = os.getenv("FRONTEND_STATUS", "")

          if readiness_status in {"dependency_failure", "unexpected_status"}:
              lines.append(
                  "API respondiendo pero dependencias caidas "
                  f"({deps_summary(readiness_redis, readiness_db)}). "
                  "No se redeploya. Revisar manualmente."
              )
              if readiness_status == "unexpected_status":
                  lines.append(f"Readiness devolvio HTTP {readiness_code}.")
          elif readiness_status == "no_response" and liveness_status == "up":
              lines.append(
                  "API respondiendo pero no esta lista para atender requests. "
                  "No se redeploya. Revisar manualmente."
              )
              lines.append(f"Liveness OK; readiness sin respuesta (healthz HTTP {liveness_code}).")

          if readiness_status == "no_response" and liveness_status == "down":
              lines.append("API caida (proceso no responde). Redeploy iniciado.")
              if redeploy_status == "success" and smoke_recovery == "complete":
                  lines.append("API caida. Redeploy completado. Recovery exitosa.")
              elif redeploy_status == "success" and smoke_recovery == "partial":
                  lines.append(
                      "API caida. Redeploy completado pero dependencias siguen fallando "
                      f"({deps_summary(smoke_redis, smoke_db)}). Requiere intervencion."
                  )
              elif redeploy_status == "failed" or smoke_health_status == "down" or smoke_recovery == "failed":
                  lines.append("API caida. Redeploy FALLO. Proceso no arranco. Intervencion urgente.")
                  if redeploy_status == "failed":
                      lines.append(f"Deploy hook devolvio HTTP {redeploy_code}.")
                  elif smoke_health_status == "down":
                      lines.append(f"Smoke healthz sin respuesta (ultimo HTTP {smoke_health_code}).")
                  elif smoke_ready_status == "unexpected_status":
                      lines.append(f"Smoke readyz devolvio HTTP {smoke_ready_code}.")

          if frontend_status == "down":
              lines.append("Frontend caido. Revisar Vercel.")

          repo = os.getenv("REPO", "")
          run_id = os.getenv("RUN_ID", "")
          if repo and run_id:
              lines.append(f"Run: https://github.com/{repo}/actions/runs/{run_id}")

          payload = json.dumps({"content": "\n".join(lines)}).encode("utf-8")
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          try:
              urllib.request.urlopen(request, timeout=15).read()
          except Exception as exc:
              print(f"Discord notification failed: {exc}")
          PY

      - name: Evaluate final status
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.mark_readiness_degraded.outcome }}" = "failure" ] || \
             [ "${{ steps.mark_frontend_degraded.outcome }}" = "failure" ] || \
             [ "${{ steps.mark_recovery_degraded.outcome }}" = "failure" ] || \
             [ "${{ steps.mark_process_unavailable.outcome }}" = "failure" ]; then
            echo "::error::One or more monitored components need attention."
            exit 1
          fi

          echo "All monitored components are healthy."

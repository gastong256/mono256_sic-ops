---
name: Weekly Ops Report

"on":
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - name: Collect GitHub Actions metrics
        id: gha_metrics
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import datetime as dt
          import json
          import os
          import urllib.parse
          import urllib.request

          repo = os.environ["REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          owner, name = repo.split("/", 1)
          start = dt.datetime.now(dt.timezone.utc) - dt.timedelta(days=7)
          start_date = start.date().isoformat()

          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {token}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def fetch_json(url: str) -> dict:
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def iter_runs(workflow_file: str):
              page = 1
              while True:
                  params = urllib.parse.urlencode({"per_page": 100, "page": page})
                  url = (
                      f"https://api.github.com/repos/{owner}/{name}/actions/workflows/"
                      f"{workflow_file}/runs?{params}"
                  )
                  payload = fetch_json(url)
                  runs = payload.get("workflow_runs", [])
                  if not runs:
                      break

                  keep_going = False
                  for run in runs:
                      created = dt.datetime.fromisoformat(
                          run["created_at"].replace("Z", "+00:00")
                      )
                      if created >= start:
                          keep_going = True
                          yield run
                  if not keep_going:
                      break
                  page += 1

          def list_steps(run_id: int):
              url = (
                  f"https://api.github.com/repos/{owner}/{name}/actions/"
                  f"runs/{run_id}/jobs?per_page=100"
              )
              payload = fetch_json(url)
              steps = []
              for job in payload.get("jobs", []):
                  steps.extend(job.get("steps", []))
              return steps

          def find_step(steps, target_name):
              for step in steps:
                  if step.get("name") == target_name:
                      return step
              return {}

          keepalive_runs = list(iter_runs("keep-alive.yml"))
          backup_runs = list(iter_runs("backup-supabase-r2.yml"))

          keepalive_total = len(keepalive_runs)
          keepalive_success = sum(
              1 for run in keepalive_runs if run.get("conclusion") == "success"
          )
          keepalive_failed = sum(
              1 for run in keepalive_runs if run.get("conclusion") == "failure"
          )

          redeploys = 0
          recoveries = 0
          redis_warnings = 0
          frontend_checks = 0
          frontend_failures = 0

          for run in keepalive_runs:
              steps = list_steps(run["id"])

              redeploy_step = find_step(steps, "Auto-redeploy on Render")
              if redeploy_step and redeploy_step.get("status") == "completed":
                  if redeploy_step.get("conclusion") in {"success", "failure"}:
                      redeploys += 1

              smoke_step = find_step(steps, "Smoke test after redeploy")
              if smoke_step and smoke_step.get("conclusion") == "success":
                  recoveries += 1

              redis_step = find_step(steps, "Mark Redis degraded")
              if redis_step and redis_step.get("conclusion") == "failure":
                  redis_warnings += 1

              frontend_step = find_step(steps, "Frontend health check")
              if frontend_step and frontend_step.get("status") == "completed":
                  if frontend_step.get("conclusion") in {"success", "failure"}:
                      frontend_checks += 1

              frontend_warning = find_step(steps, "Mark frontend degraded")
              if frontend_warning and frontend_warning.get("conclusion") == "failure":
                  frontend_failures += 1

          backup_success = sum(
              1 for run in backup_runs if run.get("conclusion") == "success"
          )
          backup_failed = sum(
              1 for run in backup_runs if run.get("conclusion") == "failure"
          )

          uptime = 0.0
          if keepalive_total:
              uptime = round((keepalive_success / keepalive_total) * 100, 2)

          frontend_status = "skipped"
          if frontend_checks:
              frontend_ok = frontend_checks - frontend_failures
              frontend_pct = round((frontend_ok / frontend_checks) * 100, 2)
              frontend_status = f"{frontend_pct}% OK ({frontend_ok}/{frontend_checks})"

          metrics = {
              "range_start": start_date,
              "range_end": dt.datetime.now(dt.timezone.utc).date().isoformat(),
              "keepalive_total": keepalive_total,
              "keepalive_success": keepalive_success,
              "keepalive_failed": keepalive_failed,
              "uptime": uptime,
              "redeploys": redeploys,
              "recoveries": recoveries,
              "redis_warnings": redis_warnings,
              "frontend_status": frontend_status,
              "backup_success": backup_success,
              "backup_failed": backup_failed,
          }

          print(json.dumps(metrics, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in metrics.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Collect R2 metrics
        id: r2_metrics
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_BUCKET_NAME:-}" ]; then
            echo "::warning::R2 secrets are missing. Storage metrics will be unavailable."
            echo "storage_bytes=0" >> "$GITHUB_OUTPUT"
            echo "backup_count=0" >> "$GITHUB_OUTPUT"
            echo "storage_summary=unavailable" >> "$GITHUB_OUTPUT"
            echo "db_size_bytes=0" >> "$GITHUB_OUTPUT"
            echo "db_summary=unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          listing="$(aws s3 ls "s3://${R2_BUCKET_NAME}/" --recursive --summarize \
            --endpoint-url "$R2_ENDPOINT")"

          backup_count="$(printf '%s\n' "$listing" | awk '/Total Objects:/ {print $3}')"
          storage_bytes="$(printf '%s\n' "$listing" | awk '/Total Size:/ {print $3}')"
          backup_count="${backup_count:-0}"
          storage_bytes="${storage_bytes:-0}"

          storage_pct="$(
            python3 - <<'PY' "$storage_bytes"
            import sys

            value = int(sys.argv[1])
            print(f"{(value / (10 * 1024 * 1024 * 1024)) * 100:.2f}")
            PY
          )"

          storage_summary="$(
            python3 - <<'PY' "$storage_bytes" "$storage_pct"
            import sys

            value = int(sys.argv[1])
            pct = sys.argv[2]
            units = ["B", "KiB", "MiB", "GiB", "TiB"]
            idx = 0
            size = float(value)
            while size >= 1024 and idx < len(units) - 1:
                size /= 1024
                idx += 1
            print(f"{size:.1f} {units[idx]} / 10 GiB ({pct}%)")
            PY
          )"

          latest_backup="$(
            aws s3 ls "s3://${R2_BUCKET_NAME}/" --recursive --endpoint-url "$R2_ENDPOINT" |
            awk '{print $4}' |
            grep '^backup_[0-9]\{8\}_[0-9]\{6\}\.dump\.gz$' |
            sort |
            tail -n 1
          )"

          db_size_bytes="0"
          db_summary="unavailable"
          if [ -n "${latest_backup:-}" ]; then
            aws s3 cp "s3://${R2_BUCKET_NAME}/${latest_backup}" /tmp/latest_backup.dump.gz \
              --endpoint-url "$R2_ENDPOINT" >/dev/null
            db_size_bytes="$(gzip -l /tmp/latest_backup.dump.gz | awk 'NR==2 {print $2}')"
            db_pct="$(
              python3 - <<'PY' "$db_size_bytes"
              import sys

              value = int(sys.argv[1])
              print(f"{(value / (500 * 1024 * 1024)) * 100:.2f}")
              PY
            )"
            db_summary="$(
              python3 - <<'PY' "$db_size_bytes" "$db_pct"
              import sys

              value = int(sys.argv[1])
              pct = sys.argv[2]
              units = ["B", "KiB", "MiB", "GiB", "TiB"]
              idx = 0
              size = float(value)
              while size >= 1024 and idx < len(units) - 1:
                  size /= 1024
                  idx += 1
              print(f"{size:.1f} {units[idx]} / 500 MiB ({pct}%)")
              PY
            )"
            rm -f /tmp/latest_backup.dump.gz
          fi

          echo "backup_count=$backup_count" >> "$GITHUB_OUTPUT"
          echo "storage_bytes=$storage_bytes" >> "$GITHUB_OUTPUT"
          echo "storage_summary=$storage_summary" >> "$GITHUB_OUTPUT"
          echo "db_size_bytes=$db_size_bytes" >> "$GITHUB_OUTPUT"
          echo "db_summary=$db_summary" >> "$GITHUB_OUTPUT"

      - name: Compose weekly report
        id: compose
        env:
          RANGE_START: ${{ steps.gha_metrics.outputs.range_start }}
          RANGE_END: ${{ steps.gha_metrics.outputs.range_end }}
          KEEPALIVE_TOTAL: ${{ steps.gha_metrics.outputs.keepalive_total }}
          KEEPALIVE_SUCCESS: ${{ steps.gha_metrics.outputs.keepalive_success }}
          UPTIME: ${{ steps.gha_metrics.outputs.uptime }}
          REDEPLOYS: ${{ steps.gha_metrics.outputs.redeploys }}
          RECOVERIES: ${{ steps.gha_metrics.outputs.recoveries }}
          REDIS_WARNINGS: ${{ steps.gha_metrics.outputs.redis_warnings }}
          FRONTEND_STATUS: ${{ steps.gha_metrics.outputs.frontend_status }}
          BACKUP_SUCCESS: ${{ steps.gha_metrics.outputs.backup_success }}
          BACKUP_FAILED: ${{ steps.gha_metrics.outputs.backup_failed }}
          BACKUP_COUNT: ${{ steps.r2_metrics.outputs.backup_count }}
          STORAGE_SUMMARY: ${{ steps.r2_metrics.outputs.storage_summary }}
          DB_SUMMARY: ${{ steps.r2_metrics.outputs.db_summary }}
        shell: bash
        run: |
          set -euo pipefail

          report="$(
            python3 <<'PY'
            import os

            lines = [
                f"Weekly Ops Report ({os.environ['RANGE_START']} to {os.environ['RANGE_END']})",
                "",
                (
                    "API Uptime: "
                    f"{os.environ['UPTIME']}% "
                    f"({os.environ['KEEPALIVE_SUCCESS']}/{os.environ['KEEPALIVE_TOTAL']} checks OK)"
                ),
                (
                    "Redeploys: "
                    f"{os.environ['REDEPLOYS']} triggered, {os.environ['RECOVERIES']} recovered"
                ),
                f"Redis: {os.environ['REDIS_WARNINGS']} warning(s) detected",
                f"Frontend: {os.environ['FRONTEND_STATUS']}",
                (
                    "Backups: "
                    f"{os.environ['BACKUP_SUCCESS']} successful, "
                    f"{os.environ['BACKUP_FAILED']} failed"
                ),
                (
                    "R2 Storage: "
                    f"{os.environ['STORAGE_SUMMARY']} across {os.environ['BACKUP_COUNT']} object(s)"
                ),
                f"DB Size: {os.environ['DB_SUMMARY']}",
            ]

            print("\n".join(lines))
            PY
          )"

          {
            echo "report<<EOF"
            printf '%s\n' "$report"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          printf '%s\n' "$report"

      - name: Resolve Discord report webhook
        id: report_webhook
        shell: bash
        env:
          DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ -n "${DISCORD_REPORT_WEBHOOK_URL:-}" ]; then
            echo "webhook_url=$DISCORD_REPORT_WEBHOOK_URL" >> "$GITHUB_OUTPUT"
            echo "source=report" >> "$GITHUB_OUTPUT"
            echo "Using DISCORD_REPORT_WEBHOOK_URL for weekly report delivery."
          elif [ -n "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "webhook_url=$DISCORD_WEBHOOK_URL" >> "$GITHUB_OUTPUT"
            echo "source=alerts-fallback" >> "$GITHUB_OUTPUT"
            echo "DISCORD_REPORT_WEBHOOK_URL not set. Falling back to DISCORD_WEBHOOK_URL."
          else
            echo "webhook_url=" >> "$GITHUB_OUTPUT"
            echo "source=log-only" >> "$GITHUB_OUTPUT"
            echo "No Discord webhook configured. Weekly report will stay in the workflow log."
          fi

      - name: Send weekly report to Discord
        if: ${{ steps.report_webhook.outputs.webhook_url != '' }}
        env:
          REPORT: ${{ steps.compose.outputs.report }}
          DISCORD_WEBHOOK_URL: ${{ steps.report_webhook.outputs.webhook_url }}
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY' || true
          import json
          import os
          import urllib.request

          payload = json.dumps({"content": os.environ["REPORT"]}).encode("utf-8")
          request = urllib.request.Request(
              os.environ["DISCORD_WEBHOOK_URL"],
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          try:
              urllib.request.urlopen(request, timeout=15).read()
          except Exception as exc:
              print(f"Discord notification failed: {exc}")
          PY

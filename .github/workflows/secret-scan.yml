name: Secret Scanner

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  detect-secrets:
    name: Scan for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so detect-secrets can diff properly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run secret scan
        run: |
          echo "Scanning repository for secrets..."

          # Generate fresh scan into a temp file (scan --baseline outputs to file, not stdout)
          # Exclude the baseline itself — it contains hashes that look like secrets
          detect-secrets scan --exclude-files '\.secrets\.baseline' > /tmp/current_scan.json

          # Compare current scan against the committed baseline
          python3 - <<'EOF'
          import sys, json

          with open("/tmp/current_scan.json") as f:
              current = json.load(f)
          with open(".secrets.baseline") as f:
              baseline = json.load(f)

          baseline_secrets = {
              (filepath, s["hashed_secret"])
              for filepath, secrets in baseline.get("results", {}).items()
              for s in secrets
          }

          new_secrets = {}
          for filepath, secrets in current.get("results", {}).items():
              for s in secrets:
                  if (filepath, s["hashed_secret"]) not in baseline_secrets:
                      new_secrets.setdefault(filepath, []).append(s)

          if new_secrets:
              print("NEW SECRETS DETECTED:")
              for filepath, secrets in new_secrets.items():
                  for s in secrets:
                      print(f"  File: {filepath}")
                      print(f"  Type: {s['type']}")
                      print(f"  Line: {s['line_number']}")
              sys.exit(1)
          else:
              print("No new secrets detected — scan passed.")
          EOF

          if [ $? -ne 0 ]; then
            echo ""
            echo "============================================================"
            echo "  SECRET SCAN FAILED — possible secrets detected above."
            echo "============================================================"
            echo ""
            echo "If this is a false positive, update the baseline:"
            echo ""
            echo "  1. Install detect-secrets locally:"
            echo "     pip install detect-secrets"
            echo ""
            echo "  2. Regenerate the baseline:"
            echo "     detect-secrets scan > .secrets.baseline"
            echo ""
            echo "  3. Audit and mark false positives:"
            echo "     detect-secrets audit .secrets.baseline"
            echo "     (press 'n' to mark as not a secret)"
            echo ""
            echo "  4. Commit the updated .secrets.baseline"
            echo ""
            echo "NEVER commit real secrets. Use GitHub Secrets instead."
            exit 1
          fi

---
name: Secret Scan

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        shell: bash
        run: | # pragma: allowlist secret
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0  # pragma: allowlist secret

      - name: Scan repository against baseline
        shell: bash
        run: | # pragma: allowlist secret
          set -euo pipefail

          cp .secrets.baseline /tmp/current_scan.baseline
          detect-secrets scan --all-files --baseline /tmp/current_scan.baseline  # pragma: allowlist secret

          python3 <<'PY'
          import json
          import sys

          with open(".secrets.baseline", "r", encoding="utf-8") as handle:
              baseline = json.load(handle)
          with open("/tmp/current_scan.baseline", "r", encoding="utf-8") as handle:
              current = json.load(handle)

          baseline_secrets = {
              (path, finding["hashed_secret"])
              for path, findings in baseline.get("results", {}).items()
              for finding in findings
          }

          new_findings = []
          for path, findings in current.get("results", {}).items():
              for finding in findings:
                  key = (path, finding["hashed_secret"])
                  if key not in baseline_secrets:
                      new_findings.append(
                          {
                              "path": path,
                              "type": finding["type"],
                              "line": finding["line_number"],
                          }
                      )

          if new_findings:
              print("New potential secrets detected:\n")
              for finding in new_findings:
                  print(
                      f"- {finding['path']}:{finding['line']} "
                      f"({finding['type']})"
                  )
              print("\nIf these are false positives:")
              print("1. Run `make setup`")
              print("2. Run `make baseline`")
              print("3. Run `make audit`")
              print("4. Commit the updated `.secrets.baseline`")
              sys.exit(1)

          print("No new secrets detected.")
          PY

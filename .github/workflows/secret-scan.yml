name: Secret Scanner

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  detect-secrets:
    name: Scan for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so detect-secrets can diff properly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run secret scan
        run: |
          echo "Scanning repository for secrets..."
          detect-secrets scan --baseline .secrets.baseline

          echo "Auditing against baseline..."
          detect-secrets audit --report --only-real .secrets.baseline > /tmp/audit_report.txt 2>&1 || true

          # Check for new unaudited secrets (potential leaks)
          if detect-secrets scan --baseline .secrets.baseline | \
             python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('results', {})
          new_secrets = {f: s for f, s in results.items() if s}
          if new_secrets:
              print('NEW SECRETS DETECTED:')
              for filepath, secrets in new_secrets.items():
                  for secret in secrets:
                      print(f'  File: {filepath}')
                      print(f'  Type: {secret[\"type\"]}')
                      print(f'  Line: {secret[\"line_number\"]}')
              sys.exit(1)
          else:
              print('No new secrets detected.')
          "; then
            echo "Secret scan passed."
          else
            echo ""
            echo "============================================================"
            echo "  SECRET SCAN FAILED — possible secrets detected above."
            echo "============================================================"
            echo ""
            echo "If this is a false positive, update the baseline:"
            echo ""
            echo "  1. Install detect-secrets locally:"
            echo "     pip install detect-secrets"
            echo ""
            echo "  2. Regenerate the baseline:"
            echo "     detect-secrets scan > .secrets.baseline"
            echo ""
            echo "  3. Audit and mark false positives:"
            echo "     detect-secrets audit .secrets.baseline"
            echo "     (press 'n' to mark as not a secret)"
            echo ""
            echo "  4. Commit the updated .secrets.baseline"
            echo ""
            echo "NEVER commit real secrets. Use GitHub Secrets instead."
            exit 1
          fi
